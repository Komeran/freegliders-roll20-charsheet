function UpdateFaith() {
    getAttrs(["willpower", "prayer"], function(values) {
        let willpower = parseInt(values.willpower) || 0;
        let prayer = parseInt(values.prayer) || 0;

        setAttrs({
            faith_max: willpower * prayer
        });

        UpdateMiracleworkingMaximum();
    });
}

function UpdateMiracleworkingMaximum() {
    getAttrs(["faith", "prayer", "miracleworkingFaith"], function(values) {
        let faith = parseInt(values.faith) || 0;
        let prayer = parseInt(values.prayer) || 0;
        let miracleworkingFaith = parseInt(values.miracleworkingFaith) || 0;

        let newMax = Math.min(prayer, faith);

        setAttrs({
            miracleworkingFaith_max: newMax,
            miracleworkingFaith: Math.min(miracleworkingFaith, newMax)
        });
    });
}

function UpdateHealing() {
    getAttrs(["prayer"], function(values) {
        let prayer = parseInt(values.prayer)||0;

        let healing = "0";

        if(prayer >= 3) {
            healing = "" + Math.floor(prayer / 3) + "d6 + " + prayer;
        }

        setAttrs({
            healing: healing
        });
    });
}

function UpdateBlessing(eventInfo) {
    if(eventInfo.previousValue === eventInfo.newValue) {
        return;
    }

    let rowId = eventInfo.sourceAttribute.split("_")[2];

    DoUpdateBlessing(rowId);
}

function UpdateBlessings() {
    getSectionIDs("blessing", function(ids) {
        for(var i = 0; i < ids.length; i++) {
            DoUpdateBlessing(ids[i]);
        }
    });
}

function DoUpdateBlessing(rowId) {
    let prefix = "repeating_blessing_" + rowId + "_blessing_";

    getAttrs([prefix + "name", "faith", prefix + "faith"], function(values) {
        let blessingName = values[prefix + "name"] || "";
        let faith = parseInt(values["faith"]) || 0;
        let faithCost = parseInt(values[prefix + "faith"]) || 0;

        let attributes = {};

        let listBlessing = BLESSINGS[blessingName.toLowerCase()];
        if(listBlessing !== undefined) {
            attributes[prefix + "action"] = listBlessing.action || "";
            attributes[prefix + "components"] = listBlessing.components || "";
            attributes[prefix + "faith"] = listBlessing.faith;
            attributes[prefix + "range"] = listBlessing.range || "";
            attributes[prefix + "area"] = listBlessing.area || "";
            attributes[prefix + "duration"] = listBlessing.duration || "";
            attributes[prefix + "description"] = listBlessing.description || "";
            attributes[prefix + "isListItem"] = "on";

            faithCost = listBlessing.faith;
        }
        else {
            attributes[prefix + "isListItem"] = "off";
        }
        
        // Check if enough Faith available
        if(faithCost > faith) {
            attributes[prefix + "error"] = "Not enough Faith!";
        }
        else {
            attributes[prefix + "error"] = " ";
        }

        setAttrs(attributes);
    });
}

function DoUpdateMeleeWeapon(id) {
    let prefix = "repeating_meleeWeapon_" + id + "_";
    
    getAttrs([prefix+"meleeWeapon_name", prefix+"meleeWeapon_weaponExpert", prefix+"meleeWeapon_skill", prefix+"meleeWeapon_damage"], function(values) {
        let weaponName = values[prefix+"meleeWeapon_name"] || "";
        let isWeaponExpert = values[prefix + "meleeWeapon_weaponExpert"] == 'on';
        let weaponSkill = values[prefix+"meleeWeapon_skill"] || "";
        let weaponDamage = values[prefix+"meleeWeapon_damage"] || "";

        let listWeapon = MELEE_WEAPONS[weaponName.toLowerCase()];
        let skill = listWeapon !== undefined? listWeapon.skill : weaponSkill;

        let sanitizedSkillName = skill.toLowerCase().replace(" ", "").replace("-", "");

        let attributes = {};

        if(listWeapon !== undefined) {
            attributes[prefix+"meleeWeapon_skill"] = listWeapon.skill;
        }

        getAttrs([sanitizedSkillName + "Mod", "bod", "brawling"], function(values) {
            let skillMod = values[sanitizedSkillName + "Mod"] || "+0";
            let bod = values["bod"] || "+0";
            let brawlingRanks = parseInt(values["brawling"]) || 0;

            // ATK
            attributes[prefix+"meleeWeapon_atk"] = skillMod;
            // Weapon Expert
            if(isWeaponExpert) {
                attributes[prefix+"meleeWeapon_atk"] += "+2";
            }

            // Damage
            let damageParts = weaponDamage.split(" ");
            if(listWeapon !== undefined) {
                damageParts = listWeapon.damage.split(" ");
            }
            let bodIndex = damageParts[0].search(/[\+\-]\d*[dD]?\d*\[BOD\]/g);
            if(bodIndex == -1) {
                damageParts[0] += bod + "[BOD]";
            }
            else {
                damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[BOD\]/g, bod + "[BOD]");
            }
            // Weapon Expert
            if(isWeaponExpert) {
                let weaponExpertIndex = damageParts[0].search(/[\+\-]\d*[dD]?\d*\[WeaponExpert\]/g);
                if(weaponExpertIndex == -1) {
                    damageParts[0] += "+2[WeaponExpert]";
                }
                else {
                    damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[WeaponExpert\]/g, "+2[WeaponExpert]");
                }
            }
            else {
                damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[WeaponExpert\]/g, "");
            }
            // Martial Arts
            if(skill == "Brawling" && brawlingRanks > 0) {
                let martialArtsDice = Math.floor((brawlingRanks + 2) / 3)
                let martialArtsIndex = damageParts[0].search(/[\+\-]\d*[dD]?\d*\[MartialArts\]/g);
                if(martialArtsIndex == -1) {
                    damageParts[0] += "+" + martialArtsDice + "d4[MartialArts]";
                }
                else {
                    damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[MartialArts\]/g, "+" + martialArtsDice + "d4[MartialArts]");
                }
            }
            else {
                damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[MartialArts\]/g, "");
            }

            let damageText = damageParts[0];
            for(let i = 1; i < damageParts.length; i++) {
                damageText += " " + damageParts[i];
            }

            attributes[prefix+"meleeWeapon_damage"] = damageText;

            setAttrs(attributes);
        });
    });
}

function DoUpdateRangedWeapon(id) {
    let prefix = "repeating_rangedWeapon_" + id + "_";
    
    getAttrs([prefix+"rangedWeapon_name", prefix+"rangedWeapon_weaponExpert", prefix+"rangedWeapon_quality", prefix+"rangedWeapon_skill", prefix+"rangedWeapon_damage"], function(values) {
        let weaponName = values[prefix+"rangedWeapon_name"] || "";
        let isWeaponExpert = values[prefix + "rangedWeapon_weaponExpert"] == 'on';
        let weaponQuality = parseInt(values[prefix + "rangedWeapon_quality"]) || 0;
        let weaponSkill = values[prefix+"rangedWeapon_skill"] || "";
        let weaponDamage = values[prefix+"rangedWeapon_damage"] || "";

        let listWeapon = RANGED_WEAPONS[weaponName.toLowerCase()];
        let skill = listWeapon !== undefined ? listWeapon.skill : weaponSkill;

        let attributes = {};
        
        if(listWeapon !== undefined) {
            attributes[prefix+"rangedWeapon_skill"] = listWeapon.skill;
            attributes[prefix+"rangedWeapon_range"] = listWeapon.range;
            attributes[prefix+"rangedWeapon_ammo"] = listWeapon.ammoMax;
        }

        let sanitizedSkillName = skill.toLowerCase().replace(" ", "").replace("-", "");

        getAttrs([sanitizedSkillName + "Mod", "bod", "agi", "gunsmithing", sanitizedSkillName], function(values) {
            let skillMod = values[sanitizedSkillName + "Mod"] || "+0";
            let bod = values["bod"] || "+0";
            let agi = values["agi"] || "+0";
            let gunsmithing = parseInt(values["gunsmithing"]) || 0;
            let skillRanks = parseInt(values[sanitizedSkillName]) || 0;

            // ATK with Gun Training
            if(gunsmithing > skillRanks) {
                attributes[prefix+"rangedWeapon_atk"] = Signed(Math.max(skillRanks, Math.floor(gunsmithing / 2)) + parseInt(agi));
            }
            else {
                attributes[prefix+"rangedWeapon_atk"] = skillMod;
            }
            // Weapon Expert
            if(isWeaponExpert) {    
                attributes[prefix+"rangedWeapon_atk"] += "+2";
            }

            // Damage
            // Fill in Quality
            let damage = weaponDamage;
            if(listWeapon !== undefined) {
                damage = listWeapon.damage;
            }
            let damageParts = damage.replaceAll("[Q]", weaponQuality).split(" ");
            // Gunsmith Extra Damage
            if(weaponQuality >= 5) {
                let diceRegex = /^(\d*)([dD]\d*)/;
                // We check if there even is a dice component at the start
                // (has to be at start to be considered base damage dice)
                let regexMatch = damageParts[0].match(diceRegex);
                if(regexMatch) {
                    let dieCount = parseInt(regexMatch[1]); // first capture group is die count
                    let dieSize = regexMatch[2]; // second capture group is die including the "d"
                    let extraDamageDice = Math.floor(weaponQuality / 5) + dieSize;
                    
                    let extraDamageIndex = damageParts[0].search(/[\+\-]\d*[dD]?\d*\[ExtraDamage\]/g);
                    if(extraDamageIndex == -1) {
                        damageParts[0] += "+" + extraDamageDice + "[ExtraDamage]";
                    }
                    else {
                        damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[ExtraDamage\]/g, "+" + extraDamageDice + "[ExtraDamage]");
                    }
                }
            }
            else {
                damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[ExtraDamage\]/g, "");
            }
            // Attribute Mod
            if(skill == "Pistol" || skill == "Rifle") {
                let agiIndex = damageParts[0].search(/[\+\-]\d*[dD]?\d*\[AGI\]/g);
                let bodIndex = damageParts[0].search(/[\+\-]\d*d?\[dD]*\[BOD\]/g);
                if(agiIndex > -1) {
                    damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[AGI\]/g, agi + "[AGI]");
                }
                if(bodIndex > -1) {
                    damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[BOD\]/g, agi + "[AGI]");
                }
                if(agiIndex == -1 && bodIndex == -1) {
                    damageParts[0] += agi + "[AGI]";
                }
            }
            else if (skill == "Bow") {
                let agiIndex = damageParts[0].search(/[\+\-]\d*[dD]?\d*\[AGI\]/g);
                let bodIndex = damageParts[0].search(/[\+\-]\d*[dD]?\d*\[BOD\]/g);
                if(agiIndex > -1) {
                    damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[AGI\]/g, bod + "[BOD]");
                }
                if(bodIndex > -1) {
                    damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[BOD\]/g, bod + "[BOD]");
                }
                if(agiIndex == -1 && bodIndex == -1) {
                    damageParts[0] += bod + "[BOD]";
                }
            }
            else {
                damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[BOD\]/g, "");
                damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[AGI\]/g, "");
            }
            // Weapon Expert
            if(isWeaponExpert) {
                let weaponExpertIndex = damageParts[0].search(/[\+\-]\d*[dD]?\d*\[WeaponExpert\]/g);
                if(weaponExpertIndex == -1) {
                    damageParts[0] += "+2[WeaponExpert]";
                }
                else {
                    damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[WeaponExpert\]/g, "+2[WeaponExpert]");
                }
            }
            else {
                damageParts[0] = damageParts[0].replaceAll(/[\+\-]\d*[dD]?\d*\[WeaponExpert\]/g, "");
            }

            let damageText = damageParts[0];
            for(let i = 1; i < damageParts.length; i++) {
                damageText += " " + damageParts[i];
            }

            attributes[prefix+"rangedWeapon_damage"] = damageText;

            setAttrs(attributes);
        });
    });
}

function DoUpdatePotion(rowId) {
    let prefix = "repeating_potion_" + rowId + "_potion_";

    getAttrs(
        [
            prefix + "name",
            prefix + "essence",
            prefix + "batch",
            "essence_fire",
            "essence_water",
            "essence_earth",
            "essence_air",
            "elementalAttunement",
            "alchemy"
        ],
        function(values) {
            let potionName = values[prefix + "name"] || "";
            let naturaString = values[prefix + "essence"] || "";
            let alchemyRanks = parseInt(values["alchemy"]) || 0;
            let batchSize = parseInt(values[prefix + "batch"]) || 0;
            
            let fireEssence = parseInt(values["essence_fire"]) || 0;
            let waterEssence = parseInt(values["essence_water"]) || 0;
            let earthEssence = parseInt(values["essence_earth"]) || 0;
            let airEssence = parseInt(values["essence_air"]) || 0;

            let elementalAttunement = values["elementalAttunement"] || "";
            
            let attributes = {};

            let listPotion = POTIONS[potionName.toLowerCase()];
            if(listPotion !== undefined) {
                attributes[prefix + "essence"] = listPotion.essence;
                attributes[prefix + "effect"] = listPotion.effect;
                
                naturaString = listPotion.essence;
                
                attributes[prefix + "isListItem"] = "on";
            }
            else {
                attributes[prefix + "isListItem"] = "off";
            }

            let essenceForQuantity = EnoughEssenceForQuantity(naturaString, airEssence, earthEssence, fireEssence, waterEssence, elementalAttunement);
            attributes[prefix + "batch_max"] = essenceForQuantity;
            attributes[prefix + "batch"] = Math.min(batchSize, essenceForQuantity);
            
            attributes[prefix + "canBrew"] = "on";

            if(alchemyRanks < 3) {
                attributes[prefix + "error"] = " ";
                attributes[prefix + "canBrew"] = "off";
            }else if(essenceForQuantity < 1) {
                attributes[prefix + "error"] = "Not enough Essence!";
            }
            else {
                attributes[prefix + "error"] = " ";
            }

            setAttrs(attributes);
        }
    );
}

function RollNpcAttack(eventInfo) {
    let rowId = eventInfo.sourceAttribute.split("_")[2];

    getAttrs(
        [
            prefix + "name",                // Name

            prefix + "isAttackTest",        // isAttackTest Checkbox
            prefix + "requiresSave",        // requiresSave Checkbox
            prefix + "atk",                 // ATK
            prefix + "difficulty",          // DT
            prefix + "saveAttribute",       // Save Attribute
            prefix + "saveSkill",           // Save Skill
            prefix + "damage",              // Damage
            prefix + "description"          // Description
        ],
        function(values) {
            let name = values[prefix + "name"] || "";
            let type = values[prefix + "type"] || "";
            let type2 = values[prefix + "type2"] || "";
            let isAttackTest = values[prefix + "isAttackTest"] == "on";
            let requiresSave = values[prefix + "requiresSave"] == "on";
            let atk = values[prefix + "atk"] || "";
            let difficulty = values[prefix + "difficulty"] || "";
            let saveAttribute = values[prefix + "saveAttribute"] || "";
            let saveSkill = values[prefix + "saveSkill"] || "";
            let damage = values[prefix + "damage"] || "";
            let description = values[prefix + "description"] || "";

            let roll = CUSTOM_TEMPLATE_BEGINNING;

            roll += "{{name=" + name + "}}";
            roll += "{{type=" + type + " " + type2 + "}}";

            // Attack Test
            if(isAttackTest) {
                roll += GetCustomTemplateAtkString(atk);
            }

            // Save Test
            if(requiresSave) {
                roll += "{{save=DT " + difficulty;

                if(saveSkill == "Evasion") {
                    roll += " Evasion";
                }
                else if(saveSkill != "none") {
                    roll += " " + saveSkill + " " + attributeMods[saveAttribute];
                }
                else {
                    roll += " " + saveAttribute;
                }

                roll += "}}";
            }

            // Damage Roll
            if(damage != "") {
                roll += DamageStringToTemplateRollString(damage);
            }

            // Description
            if(description != "") {
                roll += "{{description=" + description + "}}";
            }

            startRoll(roll, (r) => {
                finishRoll(r.rollId);
            });
        }
    );
}

function InvokeBlessing(eventInfo) {
    let rowId = eventInfo.sourceAttribute.split("_")[2];
    let prefix = "repeating_blessing_" + rowId + "_blessing_";

    getAttrs(
        [
            prefix + "name",
            prefix + "action",
            prefix + "components",
            prefix + "faith",
            prefix + "range",
            prefix + "area",
            prefix + "duration",
            prefix + "description",
            "faith",
            "prayer"
        ],
        function(values) {
            let name = values[prefix + "name"] || "";
            let action = values[prefix + "action"] || "";
            let components = values[prefix + "components"] || "";
            let blessingFaith = parseInt(values[prefix + "faith"]) || 0;
            let range = values[prefix + "range"] || "";
            let area = values[prefix + "area"] || "";
            let duration = values[prefix + "duration"] || "";
            let description = values[prefix + "description"] || "";
            let faithPool = parseInt(values["faith"]) || 0;
            let prayerRanks = parseInt(values["prayer"]) || 0;

            if(faithPool >= blessingFaith) {
                // Invoke Blessing
                let rollString = CUSTOM_TEMPLATE_BEGINNING;

                // Name
                rollString += `{{name=${name}}}`;
                // Action
                rollString += `{{action=${action}}}`;
                // Components
                rollString += `{{components=${components}}}`;
                // Power
                let powerString = `[[${prayerRanks}[Prayer Ranks]`;
                rollString += `{{power=[[${prayerRanks}[Prayer Ranks]`;
                // Additional Faith for extra Power
                if(faithPool > blessingFaith) {
                    rollString += `?{Spend more Faith?|+0 Faith, `;
                    for(let i = 1; i <= prayerRanks && (i + blessingFaith) <= faithPool; i++) {
                        rollString += `|+${i} Faith,+${i}[+${i} Faith]`;
                    }
                    rollString += `}`;
                    powerString += "?{Spend more Faith?}";
                }
                rollString += `]]}}`;
                powerString += "]]";
                // Range
                if(range != "") {
                    range = range.replaceAll("[P]", powerString);
                    rollString += `{{range=${range}}}`;
                }
                // Area
                if(area != "") {
                    area = area.replaceAll("[P]", powerString);
                    rollString += `{{area=${area}}}`;
                }
                // Duration
                if(duration != "") {
                    duration = duration.replaceAll("[P]", powerString);
                    rollString += `{{duration=${duration}}}`;
                }
                // Description
                if(description != "") {
                    description = description.replaceAll("[P]", powerString);
                    rollString += `{{description=${description}}}`;
                }
                
                startRoll(rollString, (r) => {
                    let blessingPower = r.results["power"].result;
                    let expendedFaith = blessingFaith + (blessingPower - prayerRanks);

                    setAttrs({
                        faith: faithPool - expendedFaith
                    });

                    finishRoll(r.rollId);
                });
            }
            else {
                // Can't invoke blessing!
                console.error(`Can't invoke ${name}! Not enough Faith available.`);
            }
        }
    );
}

            // Cast Spell

                && waterEssence >= naturaCosts.water
                && earthEssence >= naturaCosts.earth
                && airEssence >= naturaCosts.air)
            {
                let rollString = CUSTOM_TEMPLATE_BEGINNING;

                // Name
                rollString += `{{name=${name}}}`;
                // Action
                rollString += `{{action=${action}}}`;
                // Components
                rollString += `{{components=${components}}}`;
                // Power
                let power = spellworkRanks;

                // Miracle Working
                if(prayer >= 2 && miracleworkingFaith > 0) {
                    power += miracleworkingFaith;
                    rollString += `{{power=[[${spellworkRanks}[Spellwork]+${miracleworkingFaith}[Miracle Working]]]}}`;
                }
                else {
                    miracleworkingFaith = 0;
                    rollString += `{{power=[[${spellworkRanks}[Spellwork]]]}}`;
                }

                // Range
                if(range != "") {
                    range = range.replaceAll("[P]", `[[${power}[Power]]]`);
                    rollString += `{{range=${range}}}`;
                }
                // Area
                if(area != "") {
                    area = area.replaceAll("[P]", `[[${power}[Power]]]`);
                    rollString += `{{area=${area}}}`;
                }
                // Duration
                if(duration != "") {
                    duration = duration.replaceAll("[P]", `[[${power}[Power]]]`);
                    rollString += `{{duration=${duration}}}`;
                }
                // Attack
                if(attackType != "none") {
                    rollString += GetCustomTemplateAtkString(spellworkMod);
                }
                // Save
                if(saveType != "none") {
                    if(saveDTType.toLowerCase() == "srd") {
                        rollString += `{{save=DT @{srd} ${saveType} Test}}`;
                    }
                    else {
                        rollString += `{{save=DT ${saveDT} ${saveType} Test}}`;
                    }
                }

                // Damage
                if(damage != "") {
                    let isAttack = attackType != "none";
                    let powerAdjustedDamage = damage.replaceAll("[P]", power);
                    rollString += DamageStringToTemplateRollString(powerAdjustedDamage, isAttack, stealthRanks);
                }

                // Description
                if(description != "") {
                    description = description.replaceAll("[P]", `[[${power}[Power]]]`);
                    rollString += `{{description=${description}}}`;
                }
                
                startRoll(rollString, (r) => {
                    setAttrs({
                        essence_fire: fireEssence - naturaCosts.fire,
                        essence_water: waterEssence - naturaCosts.water,
                        essence_earth: earthEssence - naturaCosts.earth,
                        essence_air: airEssence - naturaCosts.air
                    });

                    // Miracle Working
                    if(prayer >= 2) {
                        faith -= miracleworkingFaith;
                    }

                    setAttrs({
                        "faith": faith
                    });

                    finishRoll(r.rollId);
                });
            }
            else {
                // Can't cast spell!
                console.error(`Can't cast ${name}! Not enough Essence available.`);
            }
        }
    );
}

function BrewPotion(eventInfo) {
    let rowId = eventInfo.sourceAttribute.split("_")[2];
    let prefix = "repeating_potion_" + rowId + "_potion_";

    getAttrs(
        [
            prefix + "name",
            prefix + "essence",
            prefix + "effect",
            prefix + "batch",
            "alchemy",
            "essence_fire",
            "essence_earth",
            "essence_water",
            "essence_air",
            "elementalAttunement"
        ],
        function(values) {
            let name = values[prefix + "name"] || "";
            let natura = values[prefix + "essence"] || "";
            let effect = values[prefix + "effect"] || "";
            let alchemyRanks = parseInt(values["alchemy"]) || 0;
            let batchSize = parseInt(values[prefix + "batch"]) || 0;

            let batchCount = Math.ceil(batchSize / alchemyRanks);
            
            let fireEssence = parseInt(values["essence_fire"]) || 0;
            let waterEssence = parseInt(values["essence_water"]) || 0;
            let earthEssence = parseInt(values["essence_earth"]) || 0;
            let airEssence = parseInt(values["essence_air"]) || 0;
            let elementalAttunement = values["elementalAttunement"] || "";
            
            let naturaCosts = {
                air: 0,
                earth: 0,
                fire: 0,
                water: 0
            };

            // Parse Natura field
            if(natura != "") {
                naturaCosts = ParseNatura(natura, elementalAttunement, batchSize);
            }

            // Brew Potion
            if(fireEssence >= naturaCosts.fire
                && waterEssence >= naturaCosts.water
                && earthEssence >= naturaCosts.earth
                && airEssence >= naturaCosts.air)
            {
                let rollString = CUSTOM_TEMPLATE_BEGINNING;
                let complexity = (naturaCosts.fire + naturaCosts.water + naturaCosts.air + naturaCosts.earth) / batchSize;

                // Name & Potency
                let potency = complexity;
                if(batchSize > 1) {
                    rollString += `{{name=Brewing ${batchSize} ${name} Potions [P${potency}]}}`;
                }
                else {
                    rollString += `{{name=Brewing ${name} Potion [P${potency}]}}`;
                }

                // Duration (How long it takes to brew)
                let brewHours = Math.max(1, (complexity - alchemyRanks) * batchCount);
                rollString += `{{duration=${brewHours} hours}}`;

                // Effect
                if(effect != "") {
                    effect = effect.replaceAll("[P]", `[[${potency}[Potency]]]`);
                    rollString += `{{description=${effect}}}`;
                }

                startRoll(rollString, (r) => {
                    setAttrs({
                        essence_fire: fireEssence - naturaCosts.fire,
                        essence_water: waterEssence - naturaCosts.water,
                        essence_earth: earthEssence - naturaCosts.earth,
                        essence_air: airEssence - naturaCosts.air
                    });

                    finishRoll(r.rollId);
                });
            }
        }
    );
}

        let earthEssence = parseInt(values["essence_earth"]) || 0;
        let fireEssence = parseInt(values["essence_fire"]) || 0;
        let waterEssence = parseInt(values["essence_water"]) || 0;

        let rollString = CUSTOM_TEMPLATE_BEGINNING;

        rollString += "{{duration=1 hour}}";

        rollString += "{{range=10m}}";

        // Power Level
        rollString += "{{powerlevel=[[?{Power Level";
        
        let maxPL = Math.min(summoningRanks + wil, airEssence, earthEssence, fireEssence, waterEssence);
        if(maxPL < 1) {
            return;
        }

        for(let i = 0; i <= maxPL; i++) {
            rollString += `|PL ${i},${i}`;
        }

        rollString += "}]]}}";
        
        rollString += `{{name=Summon ${spiritType} [PL ?{Power Level}]}}`;

        rollString += `{{description=You can spend 1 hour performing a summoning ritual to summon a ${spiritType} with a Power Level up to [[@{summoning}[Summoning] @{wil}[WIL]]]. You have to expend essence of each element equal to the Power Level of the ${spiritType} (minimum of 1 each). If your ritual is interrupted, you don't lose the essence, but you have to start over. At the end of the ritual, the essence is consumed and the ${spiritType} appears in an unoccupied space within 10m of you. A summoned ${spiritType} is not automatically compelled to follow your commands and returns to where it came from instantly after a number of hours equal to the ${spiritType}'s power level (minimum of 1 hour) has passed.}}`;
        
        startRoll(rollString, (r) => {
            let powerlevel = r.results.powerlevel.result;

            setAttrs({
                essence_air: airEssence - Math.max(1, powerlevel),
                essence_earth: earthEssence - Math.max(1, powerlevel),
                essence_fire: fireEssence - Math.max(1, powerlevel),
                essence_water: waterEssence - Math.max(1, powerlevel)
            });

            finishRoll(r.rollId);
        });
    });
}

function Banish() {
    let rollString = CUSTOM_TEMPLATE_BEGINNING;

    rollString += "{{name=Banish}}";

    rollString += "{{action=Major Reaction}}";

    let mod = "+@{summoning}[Summoning] @{wil}[WIL]";
    rollString += GetCustomTemplateResultString(mod);

    rollString += "{{save=Willpower test}}";

    rollString += `{{description=You can use a Major Action to make a Summoning [WIL] contest against the target's Willpower test. The target must be within 20m of you and you must be able to speak clearly. If you succeed, the target disappears and is sent back to its native plane. You can also use this feature on such a creature that is possessing another creature. If you do so and you're successful, the target creature is not banished, but instead forced to leave the host and appear in the nearest unoccupied space next to the host.}}`;
    
    startRoll(rollString, (r) => {
        finishRoll(r.rollId);
    });
}

// Helper Functions
function Signed(n) {
    return (n<0?"":"+") + n;
}

function ParseNatura(natura, elementalAttunement, quantity) {
    let naturaRegex = /[+-]?\d*\s(?:Fire|Air|Earth|Water)/gi;
    let matches = natura.match(naturaRegex);
    let fireCost = 0;
    let waterCost = 0;
    let earthCost = 0;
    let airCost = 0;
    quantity = quantity || 1;

    if(matches != undefined) {
        for(let match of matches) {
            let splitMatch = match.split(" ");
            let amount = parseInt(splitMatch[0]);
            let element = splitMatch[1];

            switch(element.toLowerCase()) {
                case "fire":
                    fireCost += amount;
                    break;
                case "water":
                    waterCost += amount;
                    break;
                case "earth":
                    earthCost += amount;
                    break;
                case "air":
                    airCost += amount;
                    break;
            }
        }
    }

    // Elemental Attunement
    if(elementalAttunement.toLowerCase() == "fire") {
        fireCost = Math.max(0, fireCost-1);
    }
    if(elementalAttunement.toLowerCase() == "water") {
        waterCost = Math.max(0, waterCost-1);
    }
    if(elementalAttunement.toLowerCase() == "earth") {
        earthCost = Math.max(0, earthCost-1);
    }
    if(elementalAttunement.toLowerCase() == "air") {
        airCost = Math.max(0, airCost-1);
    }

    return {
        air: airCost * quantity,
        earth: earthCost * quantity,
        fire: fireCost * quantity,
        water: waterCost * quantity
    };
}

function CalculateSlots(size, count) {
    let sizeParts = size.split("/");

    if(sizeParts.length > 1) {
        let slotsPerStack = parseInt(sizeParts[0]) || 0;
        let maxCountPerStack = parseInt(sizeParts[1]) || 1;

        return Math.ceil(count / maxCountPerStack) * slotsPerStack;
    }

    return (parseInt(sizeParts[0]) || 0) * count;
}

function ParseSkills(values) {
    let skills = {};

    for(let skill of SKILLS) {
        skills[skill] = parseInt(values[skill]) || 0;
    }

    return skills;
}

function ParseAttributes(values) {
    let attributes = {};

    for(let attribute of ATTRIBUTES) {
        attributes[attribute] = parseInt(values[attribute]) || 0;
    }

    return attributes;
}

function ParseAttributeMods(values) {
    let attributeMods = {};

    for(let mod of ATTRIBUTE_MODS) {
        attributeMods[mod] = parseInt(values[mod]) || 0;
    }

    return attributeMods;
}

function CapitalizeFirstLetter(str) {
  if (!str || str == "") return "";
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function DamageStringToTemplateRollString(damage, isAttack, stealthRanks, damageAddsBOD, athleticsRanks, weaponSkill, artilleryRanks, augmentationRanks) {
    let rollString = "";
    let damagePartRegex = /((?:(?:[+-]?\d+d\d+(?:\[[a-z\s]*\])*)|(?:[+-]?\d+(?:\[[a-z\s]*\])*))+)\s((?:[a-z]+(?:\s[a-z])*)+)/gi;
    let damageParts = damage.match(damagePartRegex);

    let damageRolls = {};
    let critDamageRolls = {};
    let baseDamageType = "";

    if(!!damageParts && !!damageParts.length) {
        for(let i = 0; i < damageParts.length; i++) {
            let regexResult = damageParts[i].match(/((?:(?:[+-]?\d+d\d+(?:\[[a-z\s]*\])*)|(?:[+-]?\d+(?:\[[a-z\s]*\])*))+)\s((?:[a-z]+(?:\s[a-z])*)+)/i);
            let damageAmount = regexResult[1];
            let damageType = regexResult[2].toLowerCase();

            if(i === 0) {
                baseDamageType = damageType;
            }
            
            if(damageRolls[damageType] === undefined) {
                damageRolls[damageType] = `${damageAmount}`;
            }
            else {
                let plusSign = !damageAmount.startsWith("-") ? "+" : "";
                damageRolls[damageType] += `${plusSign}${damageAmount}`;
            }
            
            // Crit
            let diceRegex = /[+-]?\d+d\d+/gi;
            let damageDice = damageAmount.match(diceRegex);

            if(!!damageDice && !!damageDice.length) {
                if(critDamageRolls[damageType] === undefined) {
                    critDamageRolls[damageType] = "";
                    
                    for(let j = 0; j < damageDice.length; j++) {
                        let plusSign = !damageDice[j].startsWith("-") && !damageDice[j].startsWith("+") && j>0 ? "+" : "";
                        critDamageRolls[damageType] += `${plusSign}${damageDice[j]}`;
                    }
                }
                else {
                    for(let j = 0; j <= damageDice.length; j++) {
                        let plusSign = !damageDice[j].startsWith("-") && !damageDice[j].startsWith("+") ? "+" : "";
                        critDamageRolls[damageType] += `${plusSign}${damageDice[j]}`;
                    }
                }
            }
        }
    }

    rollString += `{{damage=`;
    for(let damageType in damageRolls) {
        rollString += ` [[${damageRolls[damageType]}]] ${DamageTypeEmoji(damageType)}`;
    }
    rollString += `}}`;

    rollString += `{{critdamage=`;
    for(let damageType in critDamageRolls) {
        rollString += ` +[[${critDamageRolls[damageType]}]] ${DamageTypeEmoji(damageType)}`;
    }
    rollString += `}}`;

    if(isAttack) {
        // Sneak Attack
        if(stealthRanks >= 3) {
            let sneakAttackDamage = "";
            let sneakAttackDice = Math.floor(stealthRanks / 3);
            if(stealthRanks < 10) {
                sneakAttackDamage = sneakAttackDice + "d6";
            }
            else {
                sneakAttackDamage = sneakAttackDice + "d8";
            }
            rollString += `{{sneakattack=+[[${sneakAttackDamage}]] ${DamageTypeEmoji(baseDamageType)}}}`;
            rollString += `{{sneakattackcrit=+[[${sneakAttackDamage}]] ${DamageTypeEmoji(baseDamageType)}}}`;
        }

        // Powerful Strikes
        if(damageAddsBOD && athleticsRanks > 0) {
            rollString += `{{powerfulstrikes=+[[${athleticsRanks}]] ${!!baseDamageType ? DamageTypeEmoji(baseDamageType) : DamageTypeEmoji("blunt")}}}`;
        }

        // Powered Strikes
        if(weaponSkill == "Brawling" && augmentationRanks > 4) {
            rollString += `{{poweredstrikes=+[[${Math.floor(augmentationRanks/5)}d6]] ${DamageTypeEmoji("blunt")}}}`;
            rollString += `{{poweredstrikescrit=+[[${Math.floor(augmentationRanks/5)}d6]] ${DamageTypeEmoji("blunt")}}}`;
        }

        // Siege Weapons
        if(weaponSkill == "Artillery" && artilleryRanks >= 7) {
            rollString += `{{siegeweapon=+[[${artilleryRanks}d6]] ${DamageTypeEmoji("piercing")}}}`;
            rollString += `{{siegeweaponcrit=+[[${artilleryRanks}d6]] ${DamageTypeEmoji("piercing")}}}`;
        }
    }

    return rollString;
}

function DamageTypeEmoji(damageType) {
    if(DAMAGE_TYPES[damageType]) {
        return DAMAGE_TYPES[damageType];
    }
    
    return CapitalizeFirstLetter(damageType);
}

function GetCustomTemplateAtkString(mod) {
    return `?{Roll Type|` +
        `Normal,[[1d20${mod}]] {{atk=$[[0]]&#125;&#125;|` +
        `Advantage,[[{[[1d20${mod}]]&#44;[[1d20${mod}]]&#125;kh1]] {{atk=$[[0]]&#125;&#125; {{atkadvantage=$[[1]]&#125;&#125; {{advflag=[[1]]&#125;&#125;|` +
        `Disadvantage,[[{[[1d20${mod}]]&#44;[[1d20${mod}]]&#125;kl1]] {{atk=$[[0]]&#125;&#125; {{atkadvantage=$[[1]]&#125;&#125; {{disadvflag=[[1]]&#125;&#125;}`;
}

function GetCustomTemplateResultString(mod, isInitiative) {
    let initiativeString = isInitiative ? "&{tracker&#125;" : "";
    return `?{Roll Type|` +
        `Normal,[[1d20${mod}${initiativeString}]] {{result1=$[[0]]&#125;&#125;|` +
        `Advantage,[[{[[1d20${mod}]]&#44;[[1d20${mod}]]&#125;kh1${initiativeString}]] {{result1=$[[0]]&#125;&#125; {{result2=$[[1]]&#125;&#125; {{resadvflag=[[1]]&#125;&#125;|` +
        `Disadvantage,[[{[[1d20${mod}]]&#44;[[1d20${mod}]]&#125;kl1${initiativeString}]] {{result1=$[[0]]&#125;&#125; {{result2=$[[1]]&#125;&#125; {{resdisadvflag=[[1]]&#125;&#125;}`;
}

function HasEnoughEssence(naturaString, airEssence, earthEssence, fireEssence, waterEssence, elementalAttunement) {
    return EnoughEssenceForQuantity(naturaString, airEssence, earthEssence, fireEssence, waterEssence, elementalAttunement) > 0;
}

function EnoughEssenceForQuantity(naturaString, airEssence, earthEssence, fireEssence, waterEssence, elementalAttunement) {
    let naturaCosts = ParseNatura(naturaString, elementalAttunement);

    let quantity = Number.POSITIVE_INFINITY;

    if(naturaCosts.fire > 0) {
        quantity = Math.min(quantity, Math.floor(fireEssence / naturaCosts.fire));
    }
    if(naturaCosts.water > 0) {
        quantity = Math.min(quantity, Math.floor(waterEssence / naturaCosts.water));
    }
    if(naturaCosts.earth > 0) {
        quantity = Math.min(quantity, Math.floor(earthEssence / naturaCosts.earth));
    }
    if(naturaCosts.air > 0) {
        quantity = Math.min(quantity, Math.floor(airEssence / naturaCosts.air));
    }

    return quantity;
}
